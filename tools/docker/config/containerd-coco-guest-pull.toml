[plugins."io.containerd.cri.v1.runtime".containerd]
snapshotter = "native"

[plugins."io.containerd.cri.v1.runtime".containerd.runtimes.runc]
snapshotter = "native"

[proxy_plugins.nydus]
type = "snapshot"
address = "/run/containerd-nydus/containerd-nydus-grpc.sock"

[plugins."io.containerd.cri.v1.images"]
disable_snapshot_annotations = false
discard_unpacked_layers = false
use_local_image_pull = false

[plugins."io.containerd.cri.v1.runtime".containerd.runtimes.kata-qemu-coco-dev]
runtime_type = "io.containerd.kata-qemu-coco-dev.v2"
runtime_path = "/opt/coco/prebuilt/asterinas-coco/containerd-shim-kata-v2"
privileged_without_host_devices = true
pod_annotations = ["io.katacontainers.*"]
snapshotter = "nydus"

[plugins."io.containerd.cri.v1.runtime".containerd.runtimes.kata-qemu-coco-dev.options]
ConfigPath = "/opt/kata/share/defaults/kata-containers/runtimes/qemu-coco-dev/configuration-qemu-coco-dev-asterinas.toml"

[plugins."io.containerd.cri.v1.images".runtime_platforms.kata-qemu-coco-dev]
snapshotter = "nydus"

[plugins."io.containerd.cri.v1.runtime".containerd.runtimes.kata-qemu-tdx]
runtime_type = "io.containerd.kata-qemu-tdx.v2"
runtime_path = "/opt/coco/prebuilt/asterinas-coco/containerd-shim-kata-v2"
privileged_without_host_devices = true
pod_annotations = ["io.katacontainers.*"]
snapshotter = "nydus"

[plugins."io.containerd.cri.v1.runtime".containerd.runtimes.kata-qemu-tdx.options]
ConfigPath = "/opt/kata/share/defaults/kata-containers/runtimes/qemu-tdx/configuration-qemu-tdx-asterinas.toml"

[plugins."io.containerd.cri.v1.images".runtime_platforms.kata-qemu-tdx]
snapshotter = "nydus"
