name: Publish | Asterinas CoCo Image

on:
  workflow_call:
    inputs:
      push_image:
        description: Push the image when Docker Hub credentials are available
        required: false
        default: true
        type: boolean
    outputs:
      image:
        description: Built image reference
        value: ${{ jobs.publish-image.outputs.image }}
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      push_image:
        description: Push the image when Docker Hub credentials are available
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  publish-image:
    name: Build and optionally push Asterinas CoCo image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.resolve.outputs.target_image_repository }}:${{ steps.resolve.outputs.published_image_tag }}
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Resolve Build Inputs
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_PUSH_IMAGE: ${{ inputs.push_image }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          source ./tools/scripts/asterinas-coco-defaults.sh
          asterinas_base_image="${ASTERINAS_BASE_IMAGE}"
          asterinas_docker_image_version="${asterinas_base_image##*:}"
          coco_release_version="$(<VERSION)"
          kata_release_version="${KATA_VERSION}"
          target_image_repository="${IMAGE_REPOSITORY}"
          published_image_tag="${asterinas_docker_image_version}"
          kata_release_repository="${KATA_RELEASE_REPOSITORY}"
          kata_release_tag="${KATA_RELEASE_TAG}"
          kata_release_package_url=""
          coco_release_package_url=""
          should_push=false

          if [ -z "${kata_release_package_url}" ]; then
            release_json="$(mktemp)"
            gh api "repos/${kata_release_repository}/releases/tags/${kata_release_tag}" > "${release_json}"
            kata_release_package_url="$(
              python3 -c 'import json,sys; release=json.load(open(sys.argv[1], "r", encoding="utf-8")); print(next((asset.get("browser_download_url", "") for asset in release.get("assets", []) if asset.get("name", "").endswith(".tar.zst") and "asterinas" in asset.get("name", "") and "amd64" in asset.get("name", "")), ""))' "${release_json}"
            )"
            rm -f "${release_json}"
          fi

          if [ -z "${coco_release_package_url}" ]; then
            coco_release_tag="${COCO_RELEASE_TAG}"
            coco_release_package_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${coco_release_tag}/asterinas-coco-${coco_release_version}-amd64.tar.gz"
          fi

          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            case "${WORKFLOW_PUSH_IMAGE:-true}" in
              false)
                should_push=false
                ;;
              *)
                should_push=true
                ;;
            esac
          fi

          test -n "${target_image_repository}"
          test -n "${published_image_tag}"
          test -n "${asterinas_docker_image_version}"
          test -n "${kata_release_tag}"
          test -n "${kata_release_package_url}"
          test -n "${coco_release_package_url}"

          echo "asterinas_base_image=${asterinas_base_image}" >> "${GITHUB_OUTPUT}"
          echo "asterinas_docker_image_version=${asterinas_docker_image_version}" >> "${GITHUB_OUTPUT}"
          echo "coco_release_version=${coco_release_version}" >> "${GITHUB_OUTPUT}"
          echo "kata_release_version=${kata_release_version}" >> "${GITHUB_OUTPUT}"
          echo "target_image_repository=${target_image_repository}" >> "${GITHUB_OUTPUT}"
          echo "published_image_tag=${published_image_tag}" >> "${GITHUB_OUTPUT}"
          echo "kata_release_tag=${kata_release_tag}" >> "${GITHUB_OUTPUT}"
          echo "kata_release_package_url=${kata_release_package_url}" >> "${GITHUB_OUTPUT}"
          echo "coco_release_package_url=${coco_release_package_url}" >> "${GITHUB_OUTPUT}"
          echo "should_push=${should_push}" >> "${GITHUB_OUTPUT}"

          {
            echo '## Resolved Build Inputs'
            echo
            echo "- Asterinas Docker image version: \`${asterinas_docker_image_version}\`"
            echo "- CoCo release version: \`${coco_release_version}\`"
            echo "- Kata release version: \`${kata_release_version}\`"
            echo "- Base image: \`${asterinas_base_image}\`"
            echo "- Published image: \`${target_image_repository}:${published_image_tag}\`"
            echo "- Kata release tag: \`${kata_release_tag}\`"
            echo "- Kata release package: \`${kata_release_package_url}\`"
            echo "- CoCo release package: \`${coco_release_package_url}\`"
            echo "- Push enabled: \`${should_push}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Empty Local CoCo Release Context
        shell: bash
        run: |
          set -euo pipefail
          install -d /tmp/docker-build-contexts/local_coco_release

      - name: Log In to Docker Hub
        if: ${{ steps.resolve.outputs.should_push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Optionally Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/docker/Dockerfile
          build-contexts: |
            local_coco_release=/tmp/docker-build-contexts/local_coco_release
          platforms: linux/amd64
          load: ${{ steps.resolve.outputs.should_push != 'true' }}
          push: ${{ steps.resolve.outputs.should_push == 'true' }}
          provenance: false
          tags: |
            ${{ steps.resolve.outputs.target_image_repository }}:${{ steps.resolve.outputs.published_image_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Asterinas CoCo development image with prebuilt Asterinas Kata artifacts
            org.opencontainers.image.version=${{ steps.resolve.outputs.published_image_tag }}
            org.opencontainers.image.base.name=${{ steps.resolve.outputs.asterinas_base_image }}
            io.confidential-containers.version=${{ steps.resolve.outputs.coco_release_version }}
          build-args: |
            ASTERINAS_BASE_IMAGE=${{ steps.resolve.outputs.asterinas_base_image }}
            ASTERINAS_DOCKER_IMAGE_VERSION=${{ steps.resolve.outputs.asterinas_docker_image_version }}
            COCO_RELEASE_VERSION=${{ steps.resolve.outputs.coco_release_version }}
            KATA_RELEASE_TAG=${{ steps.resolve.outputs.kata_release_tag }}
            KATA_RELEASE_PACKAGE_URL=${{ steps.resolve.outputs.kata_release_package_url }}
            COCO_RELEASE_PACKAGE_URL=${{ steps.resolve.outputs.coco_release_package_url }}

      - name: Verify Local Image Metadata
        if: ${{ steps.resolve.outputs.should_push != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          docker image inspect "${{ steps.resolve.outputs.target_image_repository }}:${{ steps.resolve.outputs.published_image_tag }}" >/dev/null

      - name: Write Workflow Summary
        shell: bash
        run: |
          {
            echo '## Asterinas CoCo image result'
            echo
            echo "- Published image: \`${{ steps.resolve.outputs.target_image_repository }}:${{ steps.resolve.outputs.published_image_tag }}\`"
            echo "- Base image: \`${{ steps.resolve.outputs.asterinas_base_image }}\`"
            echo "- CoCo release version: \`${{ steps.resolve.outputs.coco_release_version }}\`"
            echo "- Asterinas Docker image version: \`${{ steps.resolve.outputs.asterinas_docker_image_version }}\`"
            echo "- Kata release package: \`${{ steps.resolve.outputs.kata_release_package_url }}\`"
            echo "- CoCo release package: \`${{ steps.resolve.outputs.coco_release_package_url }}\`"
            echo "- Push enabled: \`${{ steps.resolve.outputs.should_push }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
