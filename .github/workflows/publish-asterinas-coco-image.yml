name: Publish | Asterinas CoCo Image

on:
  workflow_dispatch:
    inputs:
      image_repository:
        description: Docker Hub repository to publish
        required: false
        default: asterinas/coco
        type: string
      kata_release_repository:
        description: Repository that hosts the Asterinas Kata release package
        required: true
        default: jjf-dev/kata-containers
        type: string
      kata_release_tag:
        description: Tag that hosts the Asterinas Kata release package
        required: false
        default: ""
        type: string
      kata_release_package_url:
        description: Optional explicit Asterinas Kata release package URL
        required: false
        default: ""
        type: string
      coco_release_package_url:
        description: Optional explicit CoCo release package URL
        required: false
        default: ""
        type: string
      push_image:
        description: Push the image when Docker Hub credentials are available
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  publish-image:
    name: Build and optionally push Asterinas CoCo image
    uses: ./.github/workflows/build-asterinas-coco-image.yml
    with:
      image_repository: ${{ inputs.image_repository }}
      kata_release_repository: ${{ inputs.kata_release_repository }}
      kata_release_tag: ${{ inputs.kata_release_tag }}
      kata_release_package_url: ${{ inputs.kata_release_package_url }}
      coco_release_package_url: ${{ inputs.coco_release_package_url }}
      push_image: ${{ inputs.push_image }}
    secrets: inherit
