name: Publish | Asterinas CoCo Image

on:
  workflow_dispatch:
    inputs:
      image_repository:
        description: Docker Hub repository to publish
        required: false
        default: asterinas/coco
        type: string
      kata_release_repository:
        description: Repository that hosts the Asterinas Kata release package
        required: true
        default: jjf-dev/kata-containers
        type: string
      kata_release_tag:
        description: Tag that hosts the Asterinas Kata release package
        required: false
        default: ""
        type: string
      kata_release_package_url:
        description: Optional explicit Asterinas Kata release package URL
        required: false
        default: ""
        type: string
      coco_release_package_url:
        description: Optional explicit CoCo release package URL
        required: false
        default: ""
        type: string
      push_image:
        description: Push the image when Docker Hub credentials are available
        required: true
        default: true
        type: boolean
permissions:
  contents: read

jobs:
  build-asterinas-coco-image:
    name: Build and optionally push Asterinas CoCo image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Build Inputs
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_IMAGE_REPOSITORY: asterinas/coco
          WORKFLOW_IMAGE_REPOSITORY: ${{ inputs.image_repository }}
          WORKFLOW_KATA_RELEASE_REPOSITORY: ${{ inputs.kata_release_repository }}
          WORKFLOW_KATA_RELEASE_TAG: ${{ inputs.kata_release_tag }}
          WORKFLOW_KATA_RELEASE_PACKAGE_URL: ${{ inputs.kata_release_package_url }}
          WORKFLOW_COCO_RELEASE_PACKAGE_URL: ${{ inputs.coco_release_package_url }}
          WORKFLOW_PUSH_IMAGE: ${{ inputs.push_image }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          upstream_asterinas_release_version="$(
            gh api repos/asterinas/asterinas/contents/VERSION?ref=main --jq .content |
              base64 -d | tr -d '\n'
          )"
          upstream_asterinas_docker_image_version="$(
            gh api repos/asterinas/asterinas/contents/DOCKER_IMAGE_VERSION?ref=main --jq .content |
              base64 -d | tr -d '\n'
          )"
          coco_release_version="$(<VERSION)"
          kata_release_version="$(<KATA_VERSION)"
          target_image_repository="${WORKFLOW_IMAGE_REPOSITORY:-${DEFAULT_IMAGE_REPOSITORY}}"
          published_image_tag="${upstream_asterinas_docker_image_version}"
          kata_release_repository="${WORKFLOW_KATA_RELEASE_REPOSITORY:-jjf-dev/kata-containers}"
          kata_release_tag="${WORKFLOW_KATA_RELEASE_TAG:-${kata_release_version}-asterinas}"
          kata_release_package_url="${WORKFLOW_KATA_RELEASE_PACKAGE_URL:-}"
          coco_release_package_url="${WORKFLOW_COCO_RELEASE_PACKAGE_URL:-}"
          should_push=false

          if [ -z "${kata_release_package_url}" ]; then
            release_json="$(mktemp)"
            gh api "repos/${kata_release_repository}/releases/tags/${kata_release_tag}" > "${release_json}"
            kata_release_package_url="$(
              python3 -c 'import json,sys; release=json.load(open(sys.argv[1], "r", encoding="utf-8")); print(next((asset.get("browser_download_url", "") for asset in release.get("assets", []) if asset.get("name", "").endswith(".tar.zst") and "asterinas" in asset.get("name", "") and "amd64" in asset.get("name", "")), ""))' "${release_json}"
            )"
            rm -f "${release_json}"
          fi

          if [ -z "${coco_release_package_url}" ]; then
            coco_release_tag="v${coco_release_version}"
            coco_release_package_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${coco_release_tag}/asterinas-coco-${coco_release_version}-amd64.tar.gz"
          fi

          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            case "${WORKFLOW_PUSH_IMAGE:-true}" in
              false)
                should_push=false
                ;;
              *)
                should_push=true
                ;;
            esac
          fi

          test -n "${target_image_repository}"
          test -n "${published_image_tag}"
          test -n "${upstream_asterinas_release_version}"
          test -n "${upstream_asterinas_docker_image_version}"
          test -n "${kata_release_tag}"
          test -n "${kata_release_package_url}"
          test -n "${coco_release_package_url}"

          echo "upstream_asterinas_release_version=${upstream_asterinas_release_version}" >> "${GITHUB_OUTPUT}"
          echo "upstream_asterinas_docker_image_version=${upstream_asterinas_docker_image_version}" >> "${GITHUB_OUTPUT}"
          echo "coco_release_version=${coco_release_version}" >> "${GITHUB_OUTPUT}"
          echo "kata_release_version=${kata_release_version}" >> "${GITHUB_OUTPUT}"
          echo "target_image_repository=${target_image_repository}" >> "${GITHUB_OUTPUT}"
          echo "published_image_tag=${published_image_tag}" >> "${GITHUB_OUTPUT}"
          echo "kata_release_tag=${kata_release_tag}" >> "${GITHUB_OUTPUT}"
          echo "kata_release_package_url=${kata_release_package_url}" >> "${GITHUB_OUTPUT}"
          echo "coco_release_package_url=${coco_release_package_url}" >> "${GITHUB_OUTPUT}"
          echo "should_push=${should_push}" >> "${GITHUB_OUTPUT}"

          {
            echo '## Resolved Build Inputs'
            echo
            echo "- Upstream Asterinas release version: \`${upstream_asterinas_release_version}\`"
            echo "- Upstream Asterinas Docker image version: \`${upstream_asterinas_docker_image_version}\`"
            echo "- CoCo release version: \`${coco_release_version}\`"
            echo "- Kata release version: \`${kata_release_version}\`"
            echo "- Base image: \`asterinas/asterinas:${upstream_asterinas_docker_image_version}\`"
            echo "- Published image: \`${target_image_repository}:${published_image_tag}\`"
            echo "- Kata release tag: \`${kata_release_tag}\`"
            echo "- Kata release package: \`${kata_release_package_url}\`"
            echo "- CoCo release package: \`${coco_release_package_url}\`"
            echo "- Push enabled: \`${should_push}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In to Docker Hub
        if: ${{ steps.resolve.outputs.should_push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Optionally Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/docker/Dockerfile
          platforms: linux/amd64
          load: ${{ steps.resolve.outputs.should_push != 'true' }}
          push: ${{ steps.resolve.outputs.should_push == 'true' }}
          provenance: false
          tags: |
            ${{ steps.resolve.outputs.target_image_repository }}:${{ steps.resolve.outputs.published_image_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Asterinas CoCo development image with prebuilt Asterinas Kata artifacts
            org.opencontainers.image.version=${{ steps.resolve.outputs.published_image_tag }}
            org.opencontainers.image.base.name=asterinas/asterinas:${{ steps.resolve.outputs.upstream_asterinas_docker_image_version }}
            io.asterinas.version=${{ steps.resolve.outputs.upstream_asterinas_release_version }}
            io.confidential-containers.version=${{ steps.resolve.outputs.coco_release_version }}
          build-args: |
            UPSTREAM_ASTERINAS_BASE_IMAGE=asterinas/asterinas:${{ steps.resolve.outputs.upstream_asterinas_docker_image_version }}
            UPSTREAM_ASTERINAS_RELEASE_VERSION=${{ steps.resolve.outputs.upstream_asterinas_release_version }}
            UPSTREAM_ASTERINAS_DOCKER_IMAGE_VERSION=${{ steps.resolve.outputs.upstream_asterinas_docker_image_version }}
            COCO_RELEASE_VERSION=${{ steps.resolve.outputs.coco_release_version }}
            KATA_RELEASE_TAG=${{ steps.resolve.outputs.kata_release_tag }}
            KATA_RELEASE_PACKAGE_URL=${{ steps.resolve.outputs.kata_release_package_url }}
            COCO_RELEASE_PACKAGE_URL=${{ steps.resolve.outputs.coco_release_package_url }}

      - name: Verify Local Image Metadata
        if: ${{ steps.resolve.outputs.should_push != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          docker image inspect "${{ steps.resolve.outputs.target_image_repository }}:${{ steps.resolve.outputs.published_image_tag }}" >/dev/null

      - name: Write Workflow Summary
        shell: bash
        run: |
          {
            echo '## Asterinas CoCo image result'
            echo
            echo "- Published image: \`${{ steps.resolve.outputs.target_image_repository }}:${{ steps.resolve.outputs.published_image_tag }}\`"
            echo "- Base image: \`asterinas/asterinas:${{ steps.resolve.outputs.upstream_asterinas_docker_image_version }}\`"
            echo "- CoCo release version: \`${{ steps.resolve.outputs.coco_release_version }}\`"
            echo "- Upstream Asterinas Docker image version: \`${{ steps.resolve.outputs.upstream_asterinas_docker_image_version }}\`"
            echo "- Kata release package: \`${{ steps.resolve.outputs.kata_release_package_url }}\`"
            echo "- CoCo release package: \`${{ steps.resolve.outputs.coco_release_package_url }}\`"
            echo "- Push enabled: \`${{ steps.resolve.outputs.should_push }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
